name: PHPCS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer, cs2pr

      - name: Install PHPCS and WordPress Coding Standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.9" \
            "wp-coding-standards/wpcs:^3.1" \
            "phpcsstandards/phpcsutils:^1.0" \
            "phpcsstandards/phpcsextra:^1.2" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$(composer global config bin-dir --absolute --quiet)" >> $GITHUB_PATH

      - name: Show PHPCS configuration
        run: phpcs -i

      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist --report=checkstyle | cs2pr
