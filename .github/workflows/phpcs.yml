name: PHPCS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '7.4'
          tools: composer, cs2pr

      - name: Install PHPCS and WordPress Coding Standards
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            "squizlabs/php_codesniffer:^3.9" \
            "wp-coding-standards/wpcs:^3.1" \
            "phpcsstandards/phpcsutils:^1.0" \
            "phpcsstandards/phpcsextra:^1.2" \
            "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "$(composer global config bin-dir --absolute --quiet)" >> $GITHUB_PATH

      - name: Show PHPCS configuration
        run: phpcs -i

      - name: Run PHPCS
        # Write the checkstyle report to a file (instead of piping) so stdout
        # can never contain progress output ahead of the XML cs2pr needs.
        run: |
          phpcs --standard=phpcs.xml.dist --report=checkstyle --report-file=/tmp/phpcs-report.xml || PHPCS_EXIT=$?
          cat /tmp/phpcs-report.xml | cs2pr
          exit ${PHPCS_EXIT:-0}
