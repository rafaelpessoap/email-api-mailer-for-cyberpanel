name: WordPress Plugin Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin-check:
    name: WordPress.org Plugin Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build distribution to scan
        run: |
          # Scan exactly what ships to users, not the repo-only files such
          # as .wordpress-org assets, CI config and development docs.
          mkdir -p /tmp/plugin-dist/email-api-mailer-for-cyberpanel
          rsync -a \
            --exclude='.git/' \
            --exclude-from='.distignore' \
            ./ /tmp/plugin-dist/email-api-mailer-for-cyberpanel/
          echo "=== Distribution contents ==="
          find /tmp/plugin-dist/email-api-mailer-for-cyberpanel -maxdepth 2 | sort

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@6f5a57e173c065a394b78688f75df543e4011902 # v1.1.5
        with:
          build-dir: /tmp/plugin-dist/email-api-mailer-for-cyberpanel
          # Warnings are reported but do not fail the build; errors still fail.
          # Uncomment to make warnings blocking:
          # fail-on-warnings: true
