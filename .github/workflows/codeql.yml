name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan on Sunday 05:00 UTC
    - cron: '0 5 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript]
        # PHP is not supported by CodeQL — WordPress Coding Standards + the
        # plugin-check workflow cover PHP static analysis instead. The
        # javascript-typescript scan is kept here as a safety net in case
        # JS/TS code is added later; "actions" audits the workflow files
        # themselves for supply-chain / injection risks.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
