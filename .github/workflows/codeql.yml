name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan on Sunday 05:00 UTC
    - cron: '0 5 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [actions]
        # PHP is not supported by CodeQL — WordPress Coding Standards + the
        # WordPress Plugin Check workflow cover PHP static analysis. The
        # "actions" scan audits the workflow files themselves for
        # supply-chain / injection risks. Add "javascript-typescript" to
        # this list if JS/TS code is ever added to the plugin.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
