version: 2
updates:
  # Keep GitHub Actions pinned versions fresh and secure.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # Composer is intentionally not enabled here: this plugin has zero runtime
  # dependencies and does not ship a composer.json. Re-enable this ecosystem
  # if one is ever added.
